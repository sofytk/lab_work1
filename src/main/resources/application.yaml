spring:
  application:
    name: lab_app

  docker:
    compose:
      enabled: false

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  datasource:
    projects:
      jdbc-url: jdbc:postgresql://localhost:5432/projects_db
      username: postgres
      password: 1234
      driver-class-name: org.postgresql.Driver
    resume:
      jdbc-url: jdbc:postgresql://localhost:5432/resume_db
      username: postgres
      password: 1234
      driver-class-name: org.postgresql.Driver
    warehouse:
      jdbc-url: jdbc:postgresql://localhost:5432/data_warehouse
      username: postgres
      password: 1234
      driver-class-name: org.postgresql.Driver

logging:
  level:
    org.hibernate.SQL: DEBUG